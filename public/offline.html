<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Hors ligne — SNTS</title>
    <link rel="icon" href="/emama-favorie.png" />
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 32px 24px;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      }
      img { width: 72px; height: 72px; }
      h1 { font-size: 20px; margin: 16px 0 8px; color: #02389B; }
      p { font-size: 14px; color: #475569; margin: 0 0 20px; line-height: 1.5; }
      button {
        appearance: none;
        background: #02389B;
        color: #fff;
        border: 0;
        padding: 10px 18px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #012a78; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/emama-favorie.png" alt="Emama" />
      <h1>Vous êtes hors ligne</h1>
      <p>Vérifiez votre connexion internet, puis réessayez. Les pages déjà visitées restent disponibles.</p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
